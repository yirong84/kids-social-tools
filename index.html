<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童社交工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            display: flex;
            align-items: center;

            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            text-decoration: none;

            transition: all 0.3s;

        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        .card .emoji { font-size: 40px; margin-bottom: 12px; }
        .card .title { font-size: 18px; color: #333; font-weight: 600; margin-bottom: 8px; }
        .card .desc { font-size: 14px; color: #666; line-height: 1.6; }
        .footer { text-align: center; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 24px; }

</head>
<body>
    <div class="container">
        <h1>🌸 儿童社交工具箱</h1>
        <p class="subtitle">给小学生的社交技能小互动</p>

        </a>
        <a href="socialskills-how2say-practice.html" class="card">
            <div class="emoji">💬</div>

            <div class="desc">被冷落、被开玩笑、想说"不"...遇到这些情况怎么说？4个场景练起来！</div>

        <p class="footer">基于心理学研究 & UNICEF社会情感学习教材设计</p>
